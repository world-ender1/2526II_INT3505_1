openapi: 3.0.3
info:
  title: Library Management API
  description: API for managing a library (Books, Authors, Borrowers)
  version: 1.0.0

servers:
  - url: http://api.library.local/v1
    description: Local Server

paths:
  /books:
    get:
      summary: Get all books
      operationId: getBooks
      responses:
        "200":
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      summary: Add a new book
      operationId: addBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      summary: Get a book by ID
      operationId: getBookById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Book not found

components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          example: 101
        title:
          type: string
          example: "The Lord of the Rings"
        author:
          type: string
          example: "J.R.R. Tolkien"
        publishedYear:
          type: integer
          example: 1954
    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
          example: "The Lord of the Rings"
        author:
          type: string
          example: "J.R.R. Tolkien"
        publishedYear:
          type: integer
          example: 1954
